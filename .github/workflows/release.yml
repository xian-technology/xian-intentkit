name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish
        required: true
        type: string
      prerelease:
        description: Whether to publish prerelease image tags
        required: true
        type: boolean
        default: false

concurrency:
  group: release-${{ github.event.release.tag_name || inputs.release_tag || github.run_id }}
  cancel-in-progress: false

jobs:
  release-context:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
    steps:
      - name: Resolve release metadata
        id: resolve
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
          RELEASE_PRERELEASE: ${{ github.event.release.prerelease || inputs.prerelease || false }}
        run: |
          if [ -z "${RELEASE_TAG}" ]; then
            echo "Release tag is required" >&2
            exit 1
          fi
          version="${RELEASE_TAG#v}"
          {
            echo "tag=${RELEASE_TAG}"
            echo "version=${version}"
            echo "prerelease=${RELEASE_PRERELEASE}"
          } >> "${GITHUB_OUTPUT}"

  build:
    needs: release-context
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-context.outputs.tag }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Clean build directories
        run: rm -rf build dist

      - name: Update package version for the release build
        env:
          RELEASE_VERSION: ${{ needs.release-context.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import re

          version = os.environ["RELEASE_VERSION"]

          replacements = {
              pathlib.Path("pyproject.toml"): (r'^version = ".*"$', f'version = "{version}"'),
              pathlib.Path("intentkit/__init__.py"): (
                  r'^__version__ = ".*"$',
                  f'__version__ = "{version}"',
              ),
          }

          for path, (pattern, replacement) in replacements.items():
              text = path.read_text()
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.MULTILINE)
              if count != 1:
                  raise SystemExit(f"Failed to update version in {path}")
              path.write_text(updated)
          PY

      - name: Build package
        run: python -m build

      - name: Verify built artifacts match the release tag
        env:
          RELEASE_VERSION: ${{ needs.release-context.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import pathlib

          version = os.environ["RELEASE_VERSION"]
          files = sorted(path.name for path in pathlib.Path("dist").iterdir() if path.is_file())
          if not files:
              raise SystemExit("No distribution artifacts were built")

          expected = [
              f"intentkit-{version}.tar.gz",
              f"intentkit-{version}-py3-none-any.whl",
          ]
          if files != expected:
              raise SystemExit(f"Built artifacts do not match {version}: {files}")
          PY

      - name: Upload release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-dist
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish:
    needs:
      - release-context
      - build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/intentkit
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs:
      - release-context
      - build
      - publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-dist
          path: dist

      - name: Upload release assets to GitHub
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.release-context.outputs.tag }}" dist/* \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber

  publish-images:
    needs: release-context
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-context.outputs.tag }}

      - name: Normalize registry owner
        id: registry
        run: echo "owner=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Docker metadata for API image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ steps.registry.outputs.owner }}/xian-intentkit
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=dev,enable=${{ needs.release-context.outputs.prerelease == 'true' }}
            type=raw,value=prod,enable=${{ needs.release-context.outputs.prerelease != 'true' }}

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          build-args: |
            RELEASE=${{ needs.release-context.outputs.tag }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=intentkit
          cache-to: type=gha,mode=max,scope=intentkit

      - name: Docker metadata for frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ steps.registry.outputs.owner }}/xian-intentkit-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=dev,enable=${{ needs.release-context.outputs.prerelease == 'true' }}
            type=raw,value=prod,enable=${{ needs.release-context.outputs.prerelease != 'true' }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          build-args: |
            NEXT_PUBLIC_VERSION=${{ needs.release-context.outputs.tag }}
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=intentkit-frontend
          cache-to: type=gha,mode=max,scope=intentkit-frontend

      - name: Docker metadata for Telegram integration image
        id: meta-telegram
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ steps.registry.outputs.owner }}/xian-intentkit-telegram
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=dev,enable=${{ needs.release-context.outputs.prerelease == 'true' }}
            type=raw,value=prod,enable=${{ needs.release-context.outputs.prerelease != 'true' }}

      - name: Build and push Telegram Integration
        uses: docker/build-push-action@v7
        with:
          context: ./integrations
          file: ./integrations/Dockerfile.telegram
          build-args: |
            RELEASE=${{ needs.release-context.outputs.tag }}
          push: true
          tags: ${{ steps.meta-telegram.outputs.tags }}
          labels: ${{ steps.meta-telegram.outputs.labels }}
          cache-from: type=gha,scope=intentkit-telegram
          cache-to: type=gha,mode=max,scope=intentkit-telegram

      - name: Docker metadata for WeChat integration image
        id: meta-wechat
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ steps.registry.outputs.owner }}/xian-intentkit-wechat
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=dev,enable=${{ needs.release-context.outputs.prerelease == 'true' }}
            type=raw,value=prod,enable=${{ needs.release-context.outputs.prerelease != 'true' }}

      - name: Build and push WeChat Integration
        uses: docker/build-push-action@v7
        with:
          context: ./integrations
          file: ./integrations/Dockerfile.wechat
          build-args: |
            RELEASE=${{ needs.release-context.outputs.tag }}
          push: true
          tags: ${{ steps.meta-wechat.outputs.tags }}
          labels: ${{ steps.meta-wechat.outputs.labels }}
          cache-from: type=gha,scope=intentkit-wechat
          cache-to: type=gha,mode=max,scope=intentkit-wechat
