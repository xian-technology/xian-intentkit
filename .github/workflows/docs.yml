name: Build Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:
    inputs:
      publish_image:
        description: "Push the built docs image to GHCR"
        required: false
        default: false
        type: boolean

jobs:
  docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@369eb591f429131d6889c46b94e711f089e6ca96
        with:
          images: |
            ghcr.io/${{ github.repository }}-docs
          tags: |
            type=raw,value=latest
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5

      - name: Login to GitHub Container Registry
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_image }}
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build docs image
        uses: docker/build-push-action@48aba3b46d1b1fec4febb7c5d0c644b249a11355
        with:
          context: ./docs
          file: ./docs/Dockerfile
          push: ${{ github.event_name == 'workflow_dispatch' && inputs.publish_image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=intentkit-docs
          cache-to: type=gha,mode=max,scope=intentkit-docs
